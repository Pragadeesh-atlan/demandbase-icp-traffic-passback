name: One-time Backfill (Demandbase ICP Traffic)

on:
  workflow_dispatch:
    inputs:
      since_date:
        description: 'Start date for data (YYYY-MM-DD). Rows before this are cleaned from the sheet.'
        required: false
        default: '2026-03-01'
      lookback_days:
        description: 'Number of days to look back from today for Snowflake query'
        required: false
        default: '30'

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat <<EOF > .env
          SNOWFLAKE_ACCOUNT=${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER=${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD=${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE=${{ secrets.SNOWFLAKE_WAREHOUSE }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_SHEETS_REFRESH_TOKEN=${{ secrets.GOOGLE_SHEETS_REFRESH_TOKEN }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB_NAME=Sheet1
          CONVERSION_NAME=ICP Traffic
          SINCE_DATE=${{ github.event.inputs.since_date }}
          LOOKBACK_DAYS=${{ github.event.inputs.lookback_days }}
          SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID=${{ secrets.SLACK_CHANNEL_ID }}
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Run backfill
        run: python main.py
