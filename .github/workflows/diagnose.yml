name: Diagnose Missing Data

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat <<EOF > .env
          SNOWFLAKE_ACCOUNT=${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER=${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD=${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE=${{ secrets.SNOWFLAKE_WAREHOUSE }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_SHEETS_REFRESH_TOKEN=${{ secrets.GOOGLE_SHEETS_REFRESH_TOKEN }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Run diagnostics
        run: python diagnose.py 2>&1 | tee /tmp/diag_output.txt

      - name: Post results to GitHub issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIAG_OUTPUT=$(cat /tmp/diag_output.txt 2>/dev/null || echo "No output captured")
          gh issue create \
            --title "Diagnostic Report ($(date -u +%Y-%m-%d))" \
            --body "### Diagnostic Report — $(date -u +%Y-%m-%dT%H:%M:%SZ)

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          \`\`\`
          ${DIAG_OUTPUT}
          \`\`\`"
